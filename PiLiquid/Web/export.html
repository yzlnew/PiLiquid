<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="katex.min.css">
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<script src="marked.min.js"></script>
<script src="math-protection.js"></script>
<style>
  /* Light-only, opaque: a shareable image reads the same everywhere. */
  html, body { margin: 0; padding: 0; background: #ffffff; }
  #doc {
    box-sizing: border-box;
    padding: 28px 30px 22px;
    font: 400 14.5px/1.6 -apple-system, "SF Pro Text", system-ui, sans-serif;
    letter-spacing: -0.01em;
    color: rgba(0,0,0,0.90);
    -webkit-font-smoothing: antialiased;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }

  .ex-header { margin-bottom: 20px; }
  .ex-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .ex-subtitle { font-size: 12px; color: rgba(0,0,0,0.5); margin-top: 2px; }
  .ex-rule { border: none; border-top: 1px solid rgba(0,0,0,0.12); margin: 10px 0 0; }
  .ex-footer { margin-top: 22px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.10);
               font-size: 10px; color: rgba(0,0,0,0.35); }

  .msg { margin: 0 0 18px; }
  .msg:last-of-type { margin-bottom: 0; }

  /* User prompt — right-aligned neutral bubble, matching the transcript. */
  .user { display: flex; justify-content: flex-end; }
  .user .bubble {
    max-width: 82%;
    background: rgba(0,0,0,0.06);
    border-radius: 16px;
    padding: 9px 14px;
    white-space: pre-wrap;
  }
  /* Collapsed slash-command invocation, echoing the composer chip. */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 500; font-size: 13.5px;
    padding: 1px 8px; border-radius: 8px; margin-right: 6px;
    background: rgba(0,0,0,0.05);
  }
  .chip svg { width: 12.5px; height: 12.5px; }
  .chip.skill     { color: #8e59d6; }
  .chip.prompt    { color: #c8781a; }
  .chip.extension { color: #159c93; }
  .chip.other     { color: #7a7a7a; }

  /* Tool call — a quiet one-line entry (collapsed, like the transcript). */
  .tool { font: 13px ui-monospace, "SF Mono", Menlo, monospace; color: rgba(0,0,0,0.5); }
  .tool .args { color: rgba(0,0,0,0.34); margin-left: 6px; }
  .tool .add { color: #1a7f37; margin-left: 8px; }
  .tool .del { color: #c0392b; margin-left: 5px; }

  .notice { font-size: 12px; color: rgba(0,0,0,0.5); }

  /* Assistant Markdown — copied from the transcript renderer (light values). */
  .assistant > *:first-child { margin-top: 0; }
  .assistant > *:last-child  { margin-bottom: 0; }
  .assistant p { margin: 0 0 0.7em; }
  .assistant h1,.assistant h2,.assistant h3,.assistant h4 {
    font-weight: 600; line-height: 1.3; margin: 1.1em 0 0.5em; letter-spacing: -0.02em; }
  .assistant h1 { font-size: 1.45em; } .assistant h2 { font-size: 1.28em; }
  .assistant h3 { font-size: 1.13em; } .assistant h4 { font-size: 1em; }
  .assistant ul, .assistant ol { margin: 0 0 0.7em; padding-left: 1.4em; }
  .assistant li { margin: 0.15em 0; }
  .assistant a { color: #0066cc; text-decoration: none; }
  .assistant code {
    font: 0.88em ui-monospace, "SF Mono", Menlo, monospace;
    background: rgba(0,0,0,0.06); padding: 0.12em 0.34em; border-radius: 5px; }
  .assistant pre {
    background: rgba(0,0,0,0.05); border-radius: 11px; padding: 12px 14px;
    overflow-x: auto; margin: 0 0 0.7em; }
  .assistant pre code { background: none; padding: 0; font-size: 0.86em; line-height: 1.5; }
  .assistant blockquote {
    margin: 0 0 0.7em; padding: 0.1em 0 0.1em 0.9em;
    border-left: 3px solid rgba(0,0,0,0.18); color: rgba(0,0,0,0.62); }
  .table-wrap {
    border: 1px solid rgba(0,0,0,0.14); border-radius: 10px; overflow: hidden;
    width: fit-content; max-width: 100%; margin: 0 0 0.7em; }
  .assistant table { border-collapse: collapse; margin: 0; font-size: 0.95em; }
  .assistant th, .assistant td {
    border: 0; border-right: 1px solid rgba(0,0,0,0.12); border-bottom: 1px solid rgba(0,0,0,0.12);
    padding: 6px 11px; text-align: left; }
  .assistant th:last-child, .assistant td:last-child { border-right: 0; }
  .assistant tr:last-child td { border-bottom: 0; }
  .assistant th { font-weight: 600; background: rgba(0,0,0,0.035); }
  .assistant hr { border: none; border-top: 1px solid rgba(0,0,0,0.12); margin: 1em 0; }
  .assistant img { max-width: 100%; }
  .katex-display { margin: 0.6em 0; overflow-x: auto; overflow-y: hidden; }
</style>
</head>
<body>
<div id="doc"></div>
<script>
  marked.setOptions({ gfm: true, breaks: true });
  const doc = document.getElementById('doc');

  function el(tag, cls) { const n = document.createElement(tag); if (cls) n.className = cls; return n; }

  // Inline glyphs echoing the composer chip's SF Symbols (sparkles / text.quote
  // / puzzlepiece / chevron), since SF Symbols aren't available to the WebView.
  const CHIP_ICON = {
    skill: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6z"/></svg>',
    prompt: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h5v5c0 2.5-1.4 4-3.8 4.8L6.4 15c1.4-.5 2.3-1.2 2.5-2.3H6V7zm7.5 0h5v5c0 2.5-1.4 4-3.8 4.8l-.8-1.8c1.4-.5 2.3-1.2 2.5-2.3h-2.9V7z"/></svg>',
    extension: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 3a2 2 0 0 1 4 0v1h2.5a1 1 0 0 1 1 1V7.5h1a2 2 0 0 1 0 4h-1V15a1 1 0 0 1-1 1H14v-1a2 2 0 0 0-4 0v1H6.5a1 1 0 0 1-1-1v-3.5h-1a2 2 0 0 1 0-4h1V5a1 1 0 0 1 1-1H10z"/></svg>',
    other: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>'
  };

  function renderAssistant(text) {
    const div = el('div', 'msg assistant');
    const protectedMath = PiMath.protect(text || '');
    div.innerHTML = marked.parse(protectedMath.text);
    PiMath.restore(div, protectedMath.items);
    try {
      renderMathInElement(div, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '$',  right: '$',  display: false },
          { left: '\\(', right: '\\)', display: false }
        ],
        throwOnError: false,
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      });
    } catch (e) { console.error('KaTeX render failed', e); }
    div.querySelectorAll('table').forEach(function (t) {
      const w = el('div', 'table-wrap'); t.parentNode.insertBefore(w, t); w.appendChild(t);
    });
    return div;
  }

  function renderUser(it) {
    const msg = el('div', 'msg user');
    const bubble = el('div', 'bubble');
    if (it.source && it.name) {
      const cls = ['skill', 'prompt', 'extension'].includes(it.source) ? it.source : 'other';
      const chip = el('span', 'chip ' + cls);
      chip.innerHTML = CHIP_ICON[cls];
      chip.appendChild(document.createTextNode(it.name));
      bubble.appendChild(chip);
    }
    if (it.text) bubble.appendChild(document.createTextNode(it.text));
    msg.appendChild(bubble);
    return msg;
  }

  function renderTool(it) {
    const div = el('div', 'msg tool');
    div.appendChild(document.createTextNode(it.name || 'tool'));
    if (it.args) { const s = el('span', 'args'); s.textContent = it.args; div.appendChild(s); }
    if (it.added)   { const s = el('span', 'add'); s.textContent = '+' + it.added; div.appendChild(s); }
    if (it.removed) { const s = el('span', 'del'); s.textContent = '−' + it.removed; div.appendChild(s); }
    return div;
  }

  window.renderConversation = function (data) {
    doc.innerHTML = '';
    if (data.title) {
      const h = el('div', 'ex-header');
      const t = el('div', 'ex-title'); t.textContent = data.title; h.appendChild(t);
      if (data.subtitle) { const s = el('div', 'ex-subtitle'); s.textContent = data.subtitle; h.appendChild(s); }
      h.appendChild(el('hr', 'ex-rule'));
      doc.appendChild(h);
    }
    (data.items || []).forEach(function (it) {
      if (it.type === 'user') doc.appendChild(renderUser(it));
      else if (it.type === 'assistant') doc.appendChild(renderAssistant(it.text));
      else if (it.type === 'tool') doc.appendChild(renderTool(it));
      else if (it.type === 'notice') {
        const n = el('div', 'msg notice'); n.textContent = it.text; doc.appendChild(n);
      }
    });
    const foot = el('div', 'ex-footer'); foot.textContent = 'Exported from Pi Liquid'; doc.appendChild(foot);

    // Wait for KaTeX/web fonts so the final height (and glyphs) are settled.
    const done = function () {
      requestAnimationFrame(function () {
        const h = Math.ceil(document.body.getBoundingClientRect().height);
        window.webkit.messageHandlers.exported.postMessage(h);
      });
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(done); else done();
  };
</script>
</body>
</html>
